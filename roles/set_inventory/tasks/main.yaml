---

- name: Find inventory directory from ansible.cfg
  tags: set_inventory
  ansible.builtin.shell: cat {{ ansible_config_file }} | grep 'inventory=' | cut -f2 -d"="
  register: find_inventory

- name: Find absolute path to project.
  tags: set_inventory
  ansible.builtin.shell: |
    ansible_config="{{ ansible_config_file }}"
    echo "${ansible_config%/*}/"
  register: find_project

- name: Fail if network_mode is NAT and jumphost vars are undefined.
  tags: set_inventory
  ansible.builtin.fail:
    msg: "Error jumphost vars undefined: when env.network_mode is NAT, you must set all env.jumphost variables."
  when:
    - (env.network_mode | upper == 'NAT')
    - (env.jumphost.name is none or env.jumphost.ip is none or env.jumphost.user is none or env.jumphost.pass is none or env.jumphost.path_to_keypair is none)

- name: Load zVM bastion configuration if installation_type is zvm
  tags: set_inventory
  ansible.builtin.include_vars:
    file: "{{ find_project.stdout }}{{ find_inventory.stdout }}/host_vars/{{ bastion_node_name | default('bastion-zvm') }}.yaml"
  when: installation_type | lower == 'zvm'
  register: zvm_bastion_vars

- name: Check for multiple bastion definitions in hosts file
  tags: set_inventory
  ansible.builtin.shell: |
    grep -c '^\[bastion\]' "{{ find_project.stdout }}{{ find_inventory.stdout }}/hosts" || echo "0"
  register: bastion_count
  changed_when: false
  failed_when: false

- name: Warn if multiple bastion sections found
  tags: set_inventory
  ansible.builtin.debug:
    msg:
      - "WARNING: Multiple [bastion] sections found in hosts file!"
      - "Count: {{ bastion_count.stdout }}"
      - "The inventory will be regenerated with a single bastion entry."
  when: bastion_count.stdout | int > 1

- name: Template out inventory with localhost, file server, KVM host, jumphost(optional) and bastion information
  tags: set_inventory
  ansible.builtin.template:
    src: hosts.j2
    dest: "{{ find_project.stdout }}{{ find_inventory.stdout }}/hosts"
    force: true

- ansible.builtin.meta: refresh_inventory

- name: Add path to Ansible private key in ansible.cfg
  tags: set_inventory
  ansible.builtin.lineinfile:
    line: "private_key_file=~/.ssh/{{ env.ansible_key_name }}"
    path: "{{ ansible_config_file }}"
    regexp: "private_key_file"
    state: present

- name: check inventory setup
  tags: set_inventory
  ansible.builtin.command: ansible-inventory --list
  register: inv_check
  failed_when: inv_check.rc != 0

- name: Gather facts to re-read inventory after changes made to inventory
  tags: set_inventory
  ansible.builtin.gather_facts:

- name: Refresh inventory
  tags: set_inventory
  ansible.builtin.meta: refresh_inventory
